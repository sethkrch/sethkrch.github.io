<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Budget Analyzer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f5f5f4;
      --color-bg-tertiary: #f0efeb;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #6b6b68;
      --color-text-tertiary: #9b9b97;
      --color-border: rgba(0,0,0,0.12);
      --color-border-md: rgba(0,0,0,0.22);
      --color-success: #3b6d11;
      --color-success-bg: #eaf3de;
      --color-warning: #854f0b;
      --color-warning-bg: #faeeda;
      --color-danger: #a32d2d;
      --color-danger-bg: #fcebeb;
      --color-info: #185fa5;
      --color-info-bg: #e6f1fb;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1c1c1a;
        --color-bg-secondary: #252522;
        --color-bg-tertiary: #2e2e2b;
        --color-text-primary: #f0efeb;
        --color-text-secondary: #a8a8a3;
        --color-text-tertiary: #6b6b67;
        --color-border: rgba(255,255,255,0.1);
        --color-border-md: rgba(255,255,255,0.2);
        --color-success: #97c459;
        --color-success-bg: #17340a;
        --color-warning: #fac775;
        --color-warning-bg: #412402;
        --color-danger: #f09595;
        --color-danger-bg: #501313;
        --color-info: #85b7eb;
        --color-info-bg: #042c53;
      }
    }

    body {
      font-family: var(--font);
      background: var(--color-bg-tertiary);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 2rem;
    }

    .step { display: none; }
    .step.active { display: block; }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .field-row.one { grid-template-columns: 1fr; }

    label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }

    input, select {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      background: var(--color-bg);
      color: var(--color-text-primary);
      outline: none;
      transition: border .15s;
      font-family: var(--font);
    }
    input:focus, select:focus { border-color: var(--color-text-primary); }

    .card {
      background: var(--color-bg);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
    }

    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .metric { background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: .85rem 1rem; }
    .metric .mlabel { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .metric .mval { font-size: 22px; font-weight: 500; }
    .metric .msub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }

    .btn {
      padding: 9px 20px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      background: transparent;
      color: var(--color-text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
      font-family: var(--font);
    }
    .btn:hover { background: var(--color-bg-secondary); }
    .btn.primary { background: var(--color-text-primary); color: var(--color-bg); border-color: var(--color-text-primary); }
    .btn.primary:hover { opacity: .85; }

    .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.25rem; }

    .bill-item { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; margin-bottom: 8px; }
    .remove-btn {
      padding: 5px 8px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border);
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary);
      font-size: 13px;
      font-family: var(--font);
    }
    .remove-btn:hover { color: var(--color-danger); border-color: var(--color-danger); }
    .add-btn {
      font-size: 13px;
      color: var(--color-text-secondary);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-family: var(--font);
    }
    .add-btn:hover { color: var(--color-text-primary); }

    .progress { display: flex; gap: 8px; margin-bottom: 1.75rem; align-items: center; }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500;
      border: 0.5px solid var(--color-border-md);
      color: var(--color-text-secondary);
      background: var(--color-bg-secondary);
      flex-shrink: 0;
    }
    .step-dot.done { background: var(--color-text-primary); color: var(--color-bg); border-color: var(--color-text-primary); }
    .step-dot.active { border-color: var(--color-text-primary); color: var(--color-text-primary); background: var(--color-bg); }
    .step-line { height: 1px; flex: 1; background: var(--color-border); }

    .result-section { margin-bottom: 1.5rem; }
    .result-section h3 { font-size: 15px; font-weight: 500; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid var(--color-border); }

    .loan-card { border-radius: var(--radius-md); border: 0.5px solid var(--color-border); padding: .9rem 1rem; margin-bottom: 8px; background: var(--color-bg); }
    .loan-card .lname { font-size: 14px; font-weight: 500; }
    .loan-card .ldetail { font-size: 13px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.55; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); margin-left: 8px; font-weight: 500; }
    .badge.good { background: var(--color-success-bg); color: var(--color-success); }
    .badge.ok { background: var(--color-warning-bg); color: var(--color-warning); }
    .badge.hard { background: var(--color-danger-bg); color: var(--color-danger); }

    .tip-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; color: var(--color-text-secondary); line-height: 1.55; }
    .tip-item i { flex-shrink: 0; margin-top: 1px; font-size: 16px; }

    .bar-wrap { margin-bottom: 8px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .bar-bg { height: 8px; background: var(--color-bg-secondary); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }

    .credit-bar-bg { height: 12px; border-radius: 6px; background: linear-gradient(to right, #e24b4a, #ef9f27, #97c459); position: relative; overflow: visible; margin-bottom: 8px; }
    .credit-marker { position: absolute; top: -4px; width: 4px; height: 20px; background: var(--color-text-primary); border-radius: 2px; transform: translateX(-50%); }

    .footer-note { font-size: 12px; color: var(--color-text-tertiary); margin-top: 8px; line-height: 1.5; }

    @media (max-width: 480px) {
      .field-row, .field-row.three { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Car Budget Analyzer</h1>
  <p class="subtitle">Figure out what you can afford, what loans you qualify for, and how to improve your position.</p>

  <div class="progress" id="progress">
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot2">2</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot3">3</div>
    <div class="step-line"></div>
    <div class="step-dot" id="dot4">4</div>
  </div>

  <!-- Step 1: Income -->
  <div class="step active" id="step1">
    <div class="section-label">Step 1 — Income</div>
    <div class="field-row">
      <div>
        <label>Monthly take-home pay ($)</label>
        <input type="number" id="income" placeholder="3500" min="0">
      </div>
      <div>
        <label>Pay frequency</label>
        <select id="payfreq">
          <option value="monthly">Monthly</option>
          <option value="biweekly">Bi-weekly</option>
          <option value="weekly">Weekly</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Other monthly income ($)</label>
        <input type="number" id="other_income" placeholder="0" min="0" value="0">
      </div>
      <div>
        <label>Savings goal per month ($)</label>
        <input type="number" id="savings_goal" placeholder="200" min="0" value="0">
      </div>
    </div>
    <div class="btn-row"><button class="btn primary" onclick="goStep(2)">Next →</button></div>
  </div>

  <!-- Step 2: Bills -->
  <div class="step" id="step2">
    <div class="section-label">Step 2 — Fixed bills</div>
    <div id="bills-list"></div>
    <button class="add-btn" onclick="addBill()"><i class="ti ti-plus" style="font-size:13px" aria-hidden="true"></i> Add a bill</button>
    <div class="section-label" style="margin-top:1.25rem">Spending categories (monthly)</div>
    <div id="cats-list"></div>
    <button class="add-btn" onclick="addCat()"><i class="ti ti-plus" style="font-size:13px" aria-hidden="true"></i> Add category</button>
    <div class="btn-row">
      <button class="btn" onclick="goStep(1)">← Back</button>
      <button class="btn primary" onclick="goStep(3)">Next →</button>
    </div>
  </div>

  <!-- Step 3: Car & Credit -->
  <div class="step" id="step3">
    <div class="section-label">Step 3 — Car details</div>
    <div class="field-row">
      <div>
        <label>Target car price ($)</label>
        <input type="number" id="car_price" placeholder="25000" min="0">
      </div>
      <div>
        <label>Down payment ($)</label>
        <input type="number" id="down_payment" placeholder="3000" min="0" value="0">
      </div>
    </div>
    <div class="field-row three">
      <div>
        <label>Loan term</label>
        <select id="loan_term">
          <option value="36">36 mo</option>
          <option value="48">48 mo</option>
          <option value="60" selected>60 mo</option>
          <option value="72">72 mo</option>
          <option value="84">84 mo</option>
        </select>
      </div>
      <div>
        <label>New or used?</label>
        <select id="car_type">
          <option value="new">New</option>
          <option value="used">Used</option>
        </select>
      </div>
      <div>
        <label>Trade-in value ($)</label>
        <input type="number" id="trade_in" placeholder="0" min="0" value="0">
      </div>
    </div>
    <div class="section-label" style="margin-top:1.25rem">Credit profile</div>
    <div class="field-row">
      <div>
        <label>Credit score (estimate)</label>
        <input type="number" id="credit_score" placeholder="680" min="300" max="850">
      </div>
      <div>
        <label>Total monthly debt payments ($)</label>
        <input type="number" id="monthly_debt" placeholder="350" min="0" value="0">
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Total credit card balances ($)</label>
        <input type="number" id="cc_balance" placeholder="2000" min="0" value="0">
      </div>
      <div>
        <label>Total credit limits ($)</label>
        <input type="number" id="cc_limit" placeholder="8000" min="0" value="0">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="goStep(2)">← Back</button>
      <button class="btn primary" onclick="analyze()">Analyze →</button>
    </div>
  </div>

  <!-- Step 4: Results -->
  <div class="step" id="step4">
    <div id="results-content"></div>
    <div class="btn-row" style="margin-top:1.5rem">
      <button class="btn" onclick="goStep(3)">← Edit inputs</button>
    </div>
  </div>
</div>

<script>
  let bills = [
    {name:'Rent / Mortgage', amount:''},
    {name:'Utilities', amount:''},
    {name:'Insurance (health, life)', amount:''}
  ];
  let cats = [
    {name:'Groceries', amount:''},
    {name:'Dining out', amount:''},
    {name:'Entertainment', amount:''}
  ];

  function renderBills() {
    document.getElementById('bills-list').innerHTML = bills.map((b,i) => `
      <div class="bill-item">
        <input type="text" value="${b.name}" placeholder="Bill name" oninput="bills[${i}].name=this.value" style="font-size:13px">
        <input type="number" value="${b.amount}" placeholder="$ / mo" oninput="bills[${i}].amount=this.value" style="width:100px;font-size:13px">
        <button class="remove-btn" onclick="removeBill(${i})" aria-label="Remove"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>`).join('');
  }

  function renderCats() {
    document.getElementById('cats-list').innerHTML = cats.map((b,i) => `
      <div class="bill-item">
        <input type="text" value="${b.name}" placeholder="Category" oninput="cats[${i}].name=this.value" style="font-size:13px">
        <input type="number" value="${b.amount}" placeholder="$ / mo" oninput="cats[${i}].amount=this.value" style="width:100px;font-size:13px">
        <button class="remove-btn" onclick="removeCat(${i})" aria-label="Remove"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>`).join('');
  }

  function addBill() { bills.push({name:'', amount:''}); renderBills(); }
  function removeBill(i) { bills.splice(i,1); renderBills(); }
  function addCat() { cats.push({name:'', amount:''}); renderCats(); }
  function removeCat(i) { cats.splice(i,1); renderCats(); }

  function goStep(n) {
    document.querySelectorAll('.step').forEach((s,i) => s.classList.toggle('active', i===n-1));
    [1,2,3,4].forEach(i => {
      const d = document.getElementById('dot'+i);
      if (i < n) { d.classList.add('done'); d.classList.remove('active'); d.innerHTML='<i class="ti ti-check" style="font-size:13px" aria-hidden="true"></i>'; }
      else if (i===n) { d.classList.add('active'); d.classList.remove('done'); d.textContent=i; }
      else { d.classList.remove('active','done'); d.textContent=i; }
    });
    if (n===2) { renderBills(); renderCats(); }
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
  function s(id) { return document.getElementById(id).value; }

  function calcMonthlyPayment(principal, rate, months) {
    if (rate===0) return principal/months;
    const r = rate/12/100;
    return principal * r * Math.pow(1+r,months) / (Math.pow(1+r,months)-1);
  }

  function getRate(score, isNew) {
    if (score>=780) return isNew?5.5:6.2;
    if (score>=720) return isNew?7.1:8.3;
    if (score>=680) return isNew?9.5:11.2;
    if (score>=640) return isNew?13.5:16.0;
    if (score>=580) return isNew?18.5:22.0;
    return isNew?24.0:28.0;
  }

  function bar(pct, color) {
    const p = Math.min(100, Math.round(pct));
    return `<div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div>`;
  }

  function analyze() {
    const income = v('income') + v('other_income');
    const savings = v('savings_goal');
    const totalBills = bills.reduce((s,b) => s+(parseFloat(b.amount)||0), 0);
    const totalCats = cats.reduce((s,b) => s+(parseFloat(b.amount)||0), 0);
    const carPrice = v('car_price');
    const down = v('down_payment') + v('trade_in');
    const term = parseInt(s('loan_term'));
    const isNew = s('car_type')==='new';
    const score = v('credit_score');
    const existingDebt = v('monthly_debt');
    const ccBal = v('cc_balance');
    const ccLim = v('cc_limit');

    const principal = Math.max(0, carPrice - down);
    const rate = getRate(score, isNew);
    const carPayment = calcMonthlyPayment(principal, rate, term);
    const totalMonthlyDebt = existingDebt + carPayment;
    const dti = income > 0 ? (totalMonthlyDebt/income)*100 : 0;
    const utilization = ccLim > 0 ? (ccBal/ccLim)*100 : 0;
    const remaining = income - savings - totalBills - totalCats - carPayment;
    const totalSpend = totalBills + totalCats + carPayment + savings;
    const budgetPct = income > 0 ? (totalSpend/income)*100 : 0;

    const dtiBadge = dti<=36?['good','Healthy']:dti<=43?['ok','Borderline']:['hard','High risk'];
    const utilBadge = utilization<=30?['good','Good']:utilization<=50?['ok','Moderate']:['hard','High'];

    const loanOptions = getLoanOptions(score, isNew, principal, term);
    const creditTips = getCreditTips(score, utilization, dti, ccBal, ccLim, existingDebt, income);

    document.getElementById('results-content').innerHTML = `
    <div class="result-section">
      <h3>Budget snapshot</h3>
      <div class="metric-grid">
        <div class="metric"><div class="mlabel">Monthly income</div><div class="mval">$${Math.round(income).toLocaleString()}</div></div>
        <div class="metric"><div class="mlabel">Car payment (est.)</div><div class="mval">$${Math.round(carPayment).toLocaleString()}</div><div class="msub">${rate.toFixed(1)}% APR, ${term} mo</div></div>
        <div class="metric"><div class="mlabel">Left after all costs</div><div class="mval" style="color:${remaining>=0?'var(--color-success)':'var(--color-danger)'}">$${Math.round(Math.abs(remaining)).toLocaleString()}${remaining<0?' over':''}</div></div>
        <div class="metric"><div class="mlabel">Debt-to-income</div><div class="mval">${Math.round(dti)}%</div><div class="msub">with car payment</div></div>
      </div>
      <div style="margin-bottom:10px">
        <div class="bar-label"><span>Total spend vs income</span><span>${Math.round(budgetPct)}%</span></div>
        ${bar(budgetPct, budgetPct>100?'#e24b4a':budgetPct>85?'#ef9f27':'#639922')}
      </div>
      ${[
        {label:'Fixed bills', val:totalBills, color:'#7f77dd'},
        {label:'Spending',     val:totalCats,  color:'#1d9e75'},
        {label:'Car payment',  val:carPayment, color:'#378add'},
        {label:'Savings',      val:savings,    color:'#ba7517'}
      ].map(r => `
      <div class="bar-wrap">
        <div class="bar-label"><span>${r.label}</span><span>$${Math.round(r.val).toLocaleString()} / mo</span></div>
        ${bar(income>0?r.val/income*100:0, r.color)}
      </div>`).join('')}
    </div>

    <div class="result-section">
      <h3>Loan options likely available to you</h3>
      ${loanOptions.map(l => `
      <div class="loan-card">
        <div class="lname">${l.name}<span class="badge ${l.tier}">${l.tierLabel}</span></div>
        <div class="ldetail">${l.detail}</div>
      </div>`).join('')}
      <p class="footer-note">Estimated rates only — actual offers vary by lender. Pre-qualifying with multiple lenders within a 14-day window counts as a single hard inquiry.</p>
    </div>

    <div class="result-section">
      <h3>Credit profile</h3>
      <div style="margin:8px 0 16px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">
          <span>Poor (300)</span><span>Fair</span><span>Good</span><span>Excellent (850)</span>
        </div>
        <div class="credit-bar-bg">
          <div class="credit-marker" style="left:${Math.max(0,Math.min(100,(score-300)/550*100))}%"></div>
        </div>
        <div style="font-size:13px;color:var(--color-text-secondary)">Score: <strong style="color:var(--color-text-primary)">${score}</strong> — ${score>=740?'Excellent: you qualify for the best rates.':score>=670?'Good: you have solid options.':score>=580?'Fair: expect higher rates; improving pays off.':'Poor: consider credit-building steps before applying.'}</div>
      </div>
      <div class="field-row">
        <div>
          <div class="bar-label"><span>Credit utilization</span><span>${Math.round(utilization)}% <span class="badge ${utilBadge[0]}">${utilBadge[1]}</span></span></div>
          ${bar(utilization,'#378add')}
          <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px">Target: below 30%</div>
        </div>
        <div>
          <div class="bar-label"><span>Debt-to-income</span><span>${Math.round(dti)}% <span class="badge ${dtiBadge[0]}">${dtiBadge[1]}</span></span></div>
          ${bar(dti,'#7f77dd')}
          <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:3px">Lenders prefer under 36–43%</div>
        </div>
      </div>
    </div>

    <div class="result-section">
      <h3>How to improve your position</h3>
      ${creditTips.map(t => `<div class="tip-item"><i class="ti ${t.icon}" style="color:${t.color}" aria-hidden="true"></i><span>${t.text}</span></div>`).join('')}
    </div>`;

    goStep(4);
  }

  function getLoanOptions(score, isNew, principal, term) {
    const opts = [];
    if (score >= 660) {
      const r = getRate(score, isNew);
      opts.push({name:'Bank or credit union auto loan', tier:'good', tierLabel:'Best bet',
        detail:`Estimated ${r.toFixed(1)}–${(r+1.5).toFixed(1)}% APR. Apply at your bank first — existing relationships often get better rates. Credit unions typically beat banks by 0.5–1.5%.`});
    }
    if (score >= 580) {
      const r = getRate(score, isNew);
      opts.push({name:'Dealership financing (captive lender)', tier:'ok', tierLabel:'Common option',
        detail:`Rates vary widely — ${(r-1).toFixed(1)}–${(r+4).toFixed(1)}% APR depending on promotions. New cars sometimes offer 0% APR for ${score>=700?'qualified':'higher-credit'} buyers. Always negotiate the car price before discussing financing.`});
    }
    if (score >= 620) {
      opts.push({name:'Online lenders (LightStream, Capital One Auto, MyAutoLoan)', tier:'ok', tierLabel:'Easy to compare',
        detail:`Pre-qualify online without a hard pull. Good for comparison shopping. Capital One Auto Navigator lets you see real rates and search inventory at participating dealers.`});
    }
    if (score < 660 && score >= 520) {
      opts.push({name:'Subprime auto lenders (DriveTime, Westlake, CAC)', tier:'hard', tierLabel:'Last resort',
        detail:`Available for scores below 660 but APR often runs 18–28%+. A $15,000 loan at 22% for 60 months costs over $7,000 in interest. Consider a smaller loan, larger down payment, or a credit-building period first.`});
    }
    if (score < 600) {
      opts.push({name:'Buy here, pay here dealerships', tier:'hard', tierLabel:'Avoid if possible',
        detail:`No credit check, but interest rates of 20–30%+ are common and vehicles are often overpriced. Building credit for 6–12 months first will save thousands.`});
    }
    opts.push({name:'Add a co-signer', tier: score>=680?'ok':'good', tierLabel: score>=680?'Optional boost':'Worth exploring',
      detail:`A co-signer with good credit (720+) can unlock significantly better rates, potentially saving hundreds per year. They share full liability for the loan.`});
    return opts;
  }

  function getCreditTips(score, utilization, dti, ccBal, ccLim, existingDebt, income) {
    const tips = [];
    if (utilization > 30) {
      const targetBal = Math.round(ccLim * 0.29);
      const paydown = Math.max(0, Math.round(ccBal - targetBal));
      tips.push({icon:'ti-credit-card', color:'var(--color-info)',
        text:`Pay down $${paydown.toLocaleString()} in credit card debt to get utilization under 30%. This alone can raise your score 20–40 points within 1–2 billing cycles.`});
    }
    if (utilization > 50) {
      tips.push({icon:'ti-alert-triangle', color:'var(--color-warning)',
        text:`Your utilization is over 50% — lenders see this as high risk. Prioritize paying it down before applying for a car loan to get a meaningfully better rate.`});
    }
    if (score < 700) {
      tips.push({icon:'ti-clock', color:'var(--color-text-secondary)',
        text:`Keep all existing accounts current — on-time payment history is 35% of your score. Even one missed payment at this score range can cost 50–100 points.`});
    }
    if (score < 660) {
      tips.push({icon:'ti-chart-line', color:'var(--color-success)',
        text:`Consider a 6–12 month credit-building period before buying. Going from 620 to 680 could cut your auto loan rate by 4–6%, saving $2,000–$4,000 over the loan term.`});
    }
    if (dti > 36) {
      tips.push({icon:'ti-percentage', color:'var(--color-warning)',
        text:`Your DTI will exceed 36% with the car payment — the threshold most lenders prefer. Increasing your down payment or choosing a less expensive car reduces this ratio.`});
    }
    if (score >= 700 && utilization <= 30) {
      tips.push({icon:'ti-star', color:'var(--color-success)',
        text:`Your credit profile looks solid. Shop at least 3–4 lenders and use competing offers to negotiate your rate down.`});
    }
    tips.push({icon:'ti-search', color:'var(--color-text-secondary)',
      text:`Rate shop within a 14-day window. Multiple auto loan inquiries in that period count as a single hard pull, so there's no penalty for comparing lenders.`});
    tips.push({icon:'ti-building-bank', color:'var(--color-info)',
      text:`Get pre-approved before visiting dealerships. This gives you a ceiling rate to negotiate from and removes financing pressure from the sales process.`});
    return tips;
  }
